# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - onlinesaathisso

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/main_onlinesaathisso.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: server/npm-shrinkwrap.json

      - name: Install dependencies and build server
        working-directory: ./server
        run: |
          npm ci
          npm run build --if-present
          npm test --if-present

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F0F5B94114C14A6D88F687E6CF57D858 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_34234A571BC144B596BBE9D3BFA4E6BD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5627C02DB6FB4AD6B6BFE4CA95181748 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'onlinesaathi-server'
          slot-name: 'Production'
          package: ./server

          
